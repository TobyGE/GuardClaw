name: Release GuardClawBar

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.4)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release macOS App
    runs-on: macos-15

    steps:
      - name: Set version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        run: npm ci --omit=dev

      - name: Build frontend
        run: |
          cd client
          npm ci
          npx vite build

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build universal binary (arm64 + x86_64)
        run: |
          cd GuardClawBar
          swift build -c release --arch arm64 --arch x86_64

      - name: Package .app bundle
        run: |
          APP_DIR="GuardClawBar.app/Contents/MacOS"
          RES_DIR="GuardClawBar.app/Contents/Resources"
          mkdir -p "$APP_DIR" "$RES_DIR"
          cp GuardClawBar/.build/apple/Products/Release/GuardClawBar "$APP_DIR/GuardClawBar"
          cp GuardClawBar/Sources/GuardClawBar/Resources/AppIcon.icns "$RES_DIR/AppIcon.icns"

          cat > GuardClawBar.app/Contents/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>GuardClawBar</string>
              <key>CFBundleIdentifier</key>
              <string>com.guardclaw.bar</string>
              <key>CFBundleName</key>
              <string>GuardClawBar</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleShortVersionString</key>
              <string>$VERSION</string>
              <key>CFBundleVersion</key>
              <string>$VERSION</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Bundle backend into app
        run: |
          # Bundle both arm64 and x64 node for universal support
          # The script auto-detects the runner arch; for universal we do both
          ./scripts/bundle-backend.sh GuardClawBar.app

      - name: Ad-hoc code sign
        run: |
          codesign --force --deep -s - GuardClawBar.app
          codesign --verify GuardClawBar.app

      - name: Create DMG
        run: |
          xattr -cr GuardClawBar.app

          mkdir -p dmg_stage
          cp -R GuardClawBar.app dmg_stage/
          ln -s /Applications dmg_stage/Applications

          hdiutil create \
            -volname "GuardClawBar" \
            -srcfolder dmg_stage \
            -ov \
            -format UDZO \
            "GuardClawBar-$VERSION.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: GuardClawBar ${{ env.VERSION }}
          body: |
            ## GuardClawBar ${{ env.VERSION }}

            macOS menu bar app for GuardClaw — **fully self-contained** with embedded backend.

            ### Install
            1. Download `GuardClawBar-${{ env.VERSION }}.dmg`
            2. Open the DMG, drag **GuardClawBar** into **Applications**
            3. First launch: right-click → **Open** → click Open in the dialog
            4. If macOS still blocks it, run: `xattr -cr /Applications/GuardClawBar.app`

            The backend starts automatically — no separate server needed.
          files: GuardClawBar-${{ env.VERSION }}.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
